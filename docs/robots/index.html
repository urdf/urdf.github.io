<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>URDF Robot Catalog</title>
  <style>
    :root {
      --bg:            #0f1117;
      --surface:       #13151c;
      --surface-hi:    #1e2130;
      --surface-hover: #252840;
      --border:        #2a2d3a;
      --text-1:        #e5e7eb;
      --text-2:        #9ca3af;
      --text-3:        #8b93a0;
      --blue:          #007aff;
      --blue-hover:    #0066cc;
      --blue-bg:       rgba(0, 122, 255, 0.15);
      --blue-text:     #4da3ff;
      --shadow:        rgba(0, 0, 0, 0.5);
    }

    @media (prefers-color-scheme: light) {
      :root {
        --bg:            #f2f2f7;
        --surface:       #ffffff;
        --surface-hi:    #f2f2f7;
        --surface-hover: #e5e5ea;
        --border:        #c6c6c8;
        --text-1:        #1c1c1e;
        --text-2:        #3c3c43;
        --text-3:        #8e8e93;
        --blue:          #007aff;
        --blue-hover:    #0066cc;
        --blue-bg:       rgba(0, 122, 255, 0.1);
        --blue-text:     #007aff;
        --shadow:        rgba(0, 0, 0, 0.12);
      }
    }

    @media (prefers-contrast: more) {
      :root {
        --border: #6b7280;
        --text-2: #d1d5db;
        --text-3: #9ca3af;
      }
    }

    @media (prefers-color-scheme: light) and (prefers-contrast: more) {
      :root {
        --border: #48484a;
        --text-2: #1c1c1e;
        --text-3: #3c3c43;
      }
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    [hidden] { display: none !important; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      background: var(--bg);
      color: var(--text-1);
      font-size: 0.875rem;
      min-height: 100dvh;
    }

    a { color: var(--blue-text); text-decoration: none; }
    a:hover { text-decoration: underline; }

    /* ── Page layout ────────────────────────────────────────────────── */

    .page {
      max-width: 1100px;
      margin: 0 auto;
      padding: 0 20px 60px;
    }

    /* ── Header ─────────────────────────────────────────────────────── */

    .site-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 0 18px;
      border-bottom: 1px solid var(--border);
      gap: 16px;
    }

    .header-left {
      display: flex;
      flex-direction: column;
      gap: 3px;
    }

    .header-title {
      font-size: 1rem;
      font-weight: 600;
      letter-spacing: -0.01em;
      color: var(--text-1);
      line-height: 1.2;
    }

    .header-sub {
      font-size: 0.6875rem;
      color: var(--text-3);
      letter-spacing: 0.01em;
    }

    .header-sub #total-count { color: var(--text-2); }

    .studio-link {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 5px 12px;
      border-radius: 6px;
      background: var(--blue);
      color: #fff;
      font-size: 0.75rem;
      font-weight: 500;
      white-space: nowrap;
      flex-shrink: 0;
      transition: background 0.12s;
    }

    .studio-link:hover { background: var(--blue-hover); text-decoration: none; }

    /* ── Filter bar ─────────────────────────────────────────────────── */

    .filter-bar {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 8px;
      padding: 14px 0;
      border-bottom: 1px solid var(--border);
    }

    .filter-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      flex: 1;
    }

    .filter-chip {
      display: inline-flex;
      align-items: center;
      padding: 3px 9px;
      border-radius: 4px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text-2);
      font-size: 0.6875rem;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.1s, border-color 0.1s, color 0.1s;
      user-select: none;
      white-space: nowrap;
      line-height: 1.6;
    }

    .filter-chip:hover {
      background: var(--surface-hover);
      color: var(--text-1);
    }

    .filter-chip.active {
      background: var(--blue-bg);
      border-color: var(--blue);
      color: var(--blue-text);
    }

    .search-wrap {
      position: relative;
      flex-shrink: 0;
    }

    .search-icon {
      position: absolute;
      left: 8px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-3);
      pointer-events: none;
      width: 14px;
      height: 14px;
    }

    #search {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text-1);
      font-size: 0.8125rem;
      padding: 5px 10px 5px 28px;
      width: 180px;
      outline: none;
      transition: border-color 0.12s;
      -webkit-appearance: none;
    }

    #search::placeholder { color: var(--text-3); }
    #search:focus { border-color: var(--blue); }

    /* ── Status bar ─────────────────────────────────────────────────── */

    .status-bar {
      display: flex;
      align-items: center;
      padding: 10px 0 0;
      min-height: 32px;
    }

    .status-count {
      font-size: 0.6875rem;
      color: var(--text-3);
    }

    .status-count strong { color: var(--text-2); font-weight: 500; }

    /* ── Robot grid ─────────────────────────────────────────────────── */

    .robot-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-top: 12px;
    }

    @media (max-width: 900px) {
      .robot-grid { grid-template-columns: repeat(2, 1fr); }
    }

    @media (max-width: 560px) {
      .robot-grid { grid-template-columns: 1fr; }
      #search { width: 140px; }
    }

    /* ── Robot card ─────────────────────────────────────────────────── */

    .robot-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      transition: box-shadow 0.15s, border-color 0.15s;
    }

    .robot-card:hover {
      box-shadow: 0 4px 20px var(--shadow);
      border-color: color-mix(in srgb, var(--border) 55%, var(--blue) 45%);
    }

    .card-body {
      padding: 14px 14px 12px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      flex: 1;
    }

    .card-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 8px;
    }

    .card-name {
      font-size: 0.9375rem;
      font-weight: 600;
      color: var(--text-1);
      letter-spacing: -0.01em;
      line-height: 1.3;
    }

    .card-badge {
      display: inline-flex;
      align-items: center;
      padding: 2px 7px;
      border-radius: 4px;
      font-size: 0.625rem;
      font-weight: 600;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      white-space: nowrap;
      flex-shrink: 0;
      margin-top: 2px;
    }

    .card-badge.parts {
      background: rgba(52, 199, 89, 0.15);
      color: #34c759;
      border: 1px solid rgba(52, 199, 89, 0.28);
    }

    .card-badge.urdf {
      background: var(--blue-bg);
      color: var(--blue-text);
      border: 1px solid rgba(0, 122, 255, 0.28);
    }

    .card-detail {
      font-size: 0.6875rem;
      color: var(--text-3);
      font-family: ui-monospace, 'SF Mono', Menlo, Consolas, monospace;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .card-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
    }

    .tag-chip {
      display: inline-flex;
      align-items: center;
      padding: 2px 7px;
      border-radius: 3px;
      background: var(--surface-hi);
      color: var(--text-3);
      font-size: 0.625rem;
      font-weight: 500;
      letter-spacing: 0.02em;
    }

    .card-footer {
      padding: 0 14px 14px;
    }

    .open-btn {
      display: block;
      width: 100%;
      padding: 7px 12px;
      border-radius: 6px;
      background: var(--blue);
      color: #fff;
      font-size: 0.8125rem;
      font-weight: 500;
      text-align: center;
      text-decoration: none;
      transition: background 0.12s;
    }

    .open-btn:hover { background: var(--blue-hover); text-decoration: none; }

    /* ── Empty / error states ───────────────────────────────────────── */

    .state-box {
      grid-column: 1 / -1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 64px 20px;
      color: var(--text-3);
      text-align: center;
    }

    .state-icon {
      font-size: 2rem;
      line-height: 1;
    }

    .state-box p { font-size: 0.8125rem; color: var(--text-2); }
    .state-box small { font-size: 0.75rem; color: var(--text-3); }
    .state-box small a { color: var(--blue-text); }

    /* ── Loading skeletons ──────────────────────────────────────────── */

    .skeleton-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .skel {
      background: var(--surface-hi);
      border-radius: 4px;
      animation: skel-pulse 1.4s ease-in-out infinite;
    }

    .skel-title  { height: 16px; width: 55%; }
    .skel-detail { height: 11px; width: 82%; }
    .skel-tags   { height: 11px; width: 60%; }
    .skel-btn    { height: 30px; width: 100%; margin-top: 4px; border-radius: 6px; }

    @keyframes skel-pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.4; }
    }
  </style>
</head>
<body>
<div class="page">

  <header class="site-header">
    <div class="header-left">
      <span class="header-title">URDF Robot Catalog</span>
      <span class="header-sub">
        urdf.github.io/robots &middot; <span id="total-count">loading&hellip;</span>
      </span>
    </div>
    <a class="studio-link" href="https://urdf.github.io/">Open Studio &rarr;</a>
  </header>

  <div class="filter-bar">
    <div class="filter-tags" id="filter-tags">
      <button class="filter-chip active" data-tag="all">All</button>
    </div>
    <div class="search-wrap">
      <svg class="search-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6" aria-hidden="true">
        <circle cx="6.5" cy="6.5" r="4.5"/>
        <line x1="10.2" y1="10.2" x2="14" y2="14"/>
      </svg>
      <input id="search" type="search" placeholder="Search robots&hellip;" autocomplete="off" spellcheck="false" aria-label="Search robots" />
    </div>
  </div>

  <div class="status-bar">
    <span class="status-count" id="status-count">&nbsp;</span>
  </div>

  <div class="robot-grid" id="robot-grid" aria-live="polite">
    <div class="skeleton-card" aria-hidden="true">
      <div class="skel skel-title"></div>
      <div class="skel skel-detail"></div>
      <div class="skel skel-tags"></div>
      <div class="skel skel-btn"></div>
    </div>
    <div class="skeleton-card" aria-hidden="true">
      <div class="skel skel-title"></div>
      <div class="skel skel-detail"></div>
      <div class="skel skel-tags"></div>
      <div class="skel skel-btn"></div>
    </div>
    <div class="skeleton-card" aria-hidden="true">
      <div class="skel skel-title"></div>
      <div class="skel skel-detail"></div>
      <div class="skel skel-tags"></div>
      <div class="skel skel-btn"></div>
    </div>
  </div>

</div>
<script>
(function () {
  'use strict';

  var VIEWER_BASE  = 'https://urdf.github.io/';
  var CATALOG_URL  = '/robots/catalog.json';

  var allRobots   = [];
  var activeTag   = 'all';
  var searchQuery = '';

  var grid        = document.getElementById('robot-grid');
  var filterTagsEl = document.getElementById('filter-tags');
  var statusEl    = document.getElementById('status-count');
  var totalEl     = document.getElementById('total-count');
  var searchEl    = document.getElementById('search');

  // ── Fetch ──────────────────────────────────────────────────────────

  fetch(CATALOG_URL)
    .then(function (res) {
      if (!res.ok) throw new Error('HTTP ' + res.status);
      return res.json();
    })
    .then(function (data) {
      if (!data || !Array.isArray(data.robots)) throw new Error('Unexpected catalog format');
      allRobots = data.robots;
      init();
    })
    .catch(function (err) {
      showError(err);
    });

  // ── Init ───────────────────────────────────────────────────────────

  function init() {
    var n = allRobots.length;
    totalEl.textContent = n + ' robot' + (n !== 1 ? 's' : '');
    buildTagFilters();
    render();
  }

  // ── Tag filters ────────────────────────────────────────────────────

  function buildTagFilters() {
    var counts = {};
    for (var i = 0; i < allRobots.length; i++) {
      var tags = allRobots[i].tags || [];
      for (var j = 0; j < tags.length; j++) {
        counts[tags[j]] = (counts[tags[j]] || 0) + 1;
      }
    }

    var sorted = Object.keys(counts).sort(function (a, b) {
      return (counts[b] - counts[a]) || a.localeCompare(b);
    });

    for (var k = 0; k < sorted.length; k++) {
      (function (tag) {
        var btn = document.createElement('button');
        btn.className = 'filter-chip';
        btn.dataset.tag = tag;
        btn.textContent = tag;
        btn.addEventListener('click', function () { setTag(tag); });
        filterTagsEl.appendChild(btn);
      })(sorted[k]);
    }

    filterTagsEl.querySelector('[data-tag="all"]').addEventListener('click', function () {
      setTag('all');
    });
  }

  function setTag(tag) {
    activeTag = tag;
    var chips = filterTagsEl.querySelectorAll('.filter-chip');
    for (var i = 0; i < chips.length; i++) {
      chips[i].classList.toggle('active', chips[i].dataset.tag === tag);
    }
    render();
  }

  // ── Filter ─────────────────────────────────────────────────────────

  function filterRobots() {
    var q = searchQuery.trim().toLowerCase();
    return allRobots.filter(function (r) {
      var tags = r.tags || [];
      var tagMatch = activeTag === 'all' || tags.indexOf(activeTag) !== -1;
      if (!tagMatch) return false;
      if (!q) return true;
      if (r.name.toLowerCase().indexOf(q) !== -1) return true;
      if (r.id.toLowerCase().indexOf(q) !== -1) return true;
      for (var i = 0; i < tags.length; i++) {
        if (tags[i].toLowerCase().indexOf(q) !== -1) return true;
      }
      return false;
    });
  }

  // ── Render ─────────────────────────────────────────────────────────

  function render() {
    var visible = filterRobots();
    grid.innerHTML = '';

    if (visible.length === 0) {
      var box = document.createElement('div');
      box.className = 'state-box';
      box.innerHTML =
        '<span class="state-icon">&#x1F916;</span>' +
        '<p>No robots match your filter.</p>' +
        '<small>Try clearing the search or selecting "All".</small>';
      grid.appendChild(box);
    } else {
      for (var i = 0; i < visible.length; i++) {
        grid.appendChild(buildCard(visible[i]));
      }
    }

    var total = allRobots.length;
    var shown = visible.length;
    if (shown === total) {
      statusEl.innerHTML = '<strong>' + total + '</strong> robot' + (total !== 1 ? 's' : '');
    } else {
      statusEl.innerHTML =
        'Showing <strong>' + shown + '</strong> of <strong>' + total + '</strong>';
    }
  }

  // ── Card builder ───────────────────────────────────────────────────

  function buildCard(robot) {
    var isParts = Boolean(robot.parts);
    var detail  = isParts ? (robot.parts + '.parts.json') : (robot.urdf || '');
    var href    = VIEWER_BASE + '?robot=' + encodeURIComponent(robot.id);

    var card = document.createElement('article');
    card.className = 'robot-card';

    // Body
    var body = document.createElement('div');
    body.className = 'card-body';

    // Top: name + badge
    var top = document.createElement('div');
    top.className = 'card-top';

    var nameEl = document.createElement('span');
    nameEl.className = 'card-name';
    nameEl.textContent = robot.name;

    var badge = document.createElement('span');
    badge.className = 'card-badge ' + (isParts ? 'parts' : 'urdf');
    badge.textContent = isParts ? 'Parts-based' : 'URDF';

    top.appendChild(nameEl);
    top.appendChild(badge);
    body.appendChild(top);

    // Detail path
    if (detail) {
      var detailEl = document.createElement('div');
      detailEl.className = 'card-detail';
      detailEl.textContent = detail;
      detailEl.title = detail;
      body.appendChild(detailEl);
    }

    // Tags
    var tags = robot.tags || [];
    if (tags.length) {
      var tagsEl = document.createElement('div');
      tagsEl.className = 'card-tags';
      for (var i = 0; i < tags.length; i++) {
        var chip = document.createElement('span');
        chip.className = 'tag-chip';
        chip.textContent = tags[i];
        tagsEl.appendChild(chip);
      }
      body.appendChild(tagsEl);
    }

    card.appendChild(body);

    // Footer: open button
    var footer = document.createElement('div');
    footer.className = 'card-footer';

    var btn = document.createElement('a');
    btn.className = 'open-btn';
    btn.href = href;
    btn.textContent = 'Open in Viewer \u2192';

    footer.appendChild(btn);
    card.appendChild(footer);

    return card;
  }

  // ── Error state ────────────────────────────────────────────────────

  function showError(err) {
    console.error('Catalog load failed:', err);
    totalEl.textContent = 'unavailable';
    grid.innerHTML = '';

    var box = document.createElement('div');
    box.className = 'state-box';
    box.innerHTML =
      '<span class="state-icon">&#x26A0;&#xFE0F;</span>' +
      '<p>Could not load the robot catalog.</p>' +
      '<small>' + esc(String(err && err.message || err)) + '</small>' +
      '<small>View the robots on <a href="https://github.com/gkjohnson/urdf-loaders/tree/master/robots" target="_blank" rel="noopener">GitHub</a> or try again later.</small>';
    grid.appendChild(box);

    statusEl.innerHTML = '';
    filterTagsEl.style.visibility = 'hidden';
  }

  function esc(s) {
    return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
  }

  // ── Search ─────────────────────────────────────────────────────────

  searchEl.addEventListener('input', function () {
    searchQuery = searchEl.value;
    render();
  });
})();
</script>
</body>
</html>
