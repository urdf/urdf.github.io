<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>URDF Viewer</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, sans-serif;
      background: #0f1117;
      color: #eee;
      display: grid;
      grid-template-columns: 260px 1fr;
      height: 100dvh;
      overflow: hidden;
    }

    /* ── Sidebar ─────────────────────────────────────────────────────────── */

    aside {
      background: #13151c;
      border-right: 1px solid #2a2d3a;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    header {
      padding: 14px 16px;
      border-bottom: 1px solid #2a2d3a;
    }

    header h1 {
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.08em;
      color: #6b7280;
      text-transform: uppercase;
    }

    /* ── Section blocks ──────────────────────────────────────────────────── */

    .section {
      padding: 10px 12px;
      border-bottom: 1px solid #2a2d3a;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .section-label {
      font-size: 11px;
      font-weight: 500;
      color: #4b5563;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    /* ── Robot picker ────────────────────────────────────────────────────── */

    .robot-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
    }

    .robot-btn {
      background: #1e2130;
      border: 1px solid #2a2d3a;
      border-radius: 5px;
      color: #9ca3af;
      font-size: 12px;
      padding: 4px 10px;
      cursor: pointer;
      transition: background 0.12s, color 0.12s, border-color 0.12s;
      white-space: nowrap;
    }

    .robot-btn:hover { background: #252840; color: #e5e7eb; }
    .robot-btn.active { background: #1e3a5f; border-color: #3b82f6; color: #93c5fd; }

    /* ── URL input ───────────────────────────────────────────────────────── */

    .url-row {
      display: flex;
      gap: 6px;
    }

    .url-input {
      flex: 1;
      background: #1e2130;
      border: 1px solid #2a2d3a;
      border-radius: 5px;
      color: #e5e7eb;
      font-size: 12px;
      padding: 5px 8px;
      min-width: 0;
    }

    .url-input::placeholder { color: #4b5563; }
    .url-input:focus { outline: none; border-color: #3b82f6; }

    .url-load-btn {
      background: #1e3a5f;
      border: 1px solid #3b82f6;
      border-radius: 5px;
      color: #93c5fd;
      font-size: 12px;
      padding: 5px 10px;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.12s;
    }

    .url-load-btn:hover { background: #1d4ed8; color: #fff; }

    /* ── Checkboxes ──────────────────────────────────────────────────────── */

    .option {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      cursor: pointer;
      user-select: none;
      color: #d1d5db;
    }

    .option input[type=checkbox] { accent-color: #3b82f6; width: 14px; height: 14px; }

    select {
      background: #1e2130;
      color: #e5e7eb;
      border: 1px solid #2a2d3a;
      border-radius: 5px;
      padding: 4px 8px;
      font-size: 12px;
      flex: 1;
    }

    select:focus { outline: none; border-color: #3b82f6; }

    /* ── Joints ──────────────────────────────────────────────────────────── */

    .joints {
      flex: 1;
      overflow-y: auto;
      padding: 6px;
    }

    .joints::-webkit-scrollbar { width: 4px; }
    .joints::-webkit-scrollbar-track { background: transparent; }
    .joints::-webkit-scrollbar-thumb { background: #2a2d3a; border-radius: 2px; }

    .joint {
      padding: 7px 8px;
      border-radius: 6px;
      margin-bottom: 2px;
      transition: background 0.12s;
    }

    .joint[data-hovered] { background: #1e2130; }

    .joint-name {
      font-size: 11px;
      color: #6b7280;
      margin-bottom: 4px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .joint-row {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .joint-row input[type=range] {
      flex: 1;
      accent-color: #3b82f6;
      height: 4px;
    }

    .joint-row input[type=number] {
      width: 58px;
      background: #1e2130;
      border: 1px solid #2a2d3a;
      border-radius: 4px;
      color: #e5e7eb;
      padding: 2px 4px;
      font-size: 11px;
      text-align: right;
    }

    .joint-row input:focus { outline: none; }

    /* ── Viewer area ─────────────────────────────────────────────────────── */

    main {
      position: relative;
      overflow: hidden;
    }

    urdf-viewer {
      width: 100%;
      height: 100%;
      display: block;
    }

    /* ── Loading overlay ─────────────────────────────────────────────────── */

    .loading {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(15, 17, 23, 0.6);
      backdrop-filter: blur(4px);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s;
    }

    .loading.visible {
      opacity: 1;
      pointer-events: auto;
    }

    .spinner {
      width: 36px;
      height: 36px;
      border: 3px solid #2a2d3a;
      border-top-color: #3b82f6;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Drop hint ───────────────────────────────────────────────────────── */

    .drop-hint {
      position: absolute;
      bottom: 16px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 12px;
      color: #4b5563;
      pointer-events: none;
      white-space: nowrap;
    }

    /* ── Part hover label ─────────────────────────────────────────────────── */

    .part-label {
      position: fixed;
      background: rgba(13, 15, 20, 0.90);
      border: 1px solid #2a2d3a;
      border-radius: 4px;
      color: #e5e7eb;
      font-size: 12px;
      padding: 3px 8px;
      pointer-events: none;
      white-space: nowrap;
      display: none;
      z-index: 100;
    }
  </style>
</head>
<body>
  <aside>
    <header>
      <h1>URDF Viewer</h1>
    </header>

    <div class="section">
      <div class="section-label">Robots</div>
      <div class="robot-grid" id="robots"></div>
    </div>

    <div class="section">
      <div class="section-label">Load URL</div>
      <div class="url-row">
        <input class="url-input" id="url-input" type="url" placeholder="https://…/robot.urdf" />
        <button class="url-load-btn" id="url-load">Load</button>
      </div>
    </div>

    <div class="section">
      <label class="option">
        <input type="checkbox" id="ignore-limits" /> Ignore limits
      </label>
      <label class="option">
        <input type="checkbox" id="show-collision" /> Show collision
      </label>
      <label class="option">
        <input type="checkbox" id="display-shadow" /> Shadow
      </label>
      <label class="option" style="gap:12px">
        Up
        <select id="up-axis">
          <option value="+Z">+Z (ROS)</option>
          <option value="-Z">−Z</option>
          <option value="+Y">+Y</option>
          <option value="-Y">−Y</option>
        </select>
      </label>
    </div>

    <div class="section-label" style="padding: 10px 12px 4px; color:#4b5563; font-size:11px; text-transform:uppercase; letter-spacing:.06em;">Joints</div>
    <div class="joints" id="joints"></div>
  </aside>

  <main>
    <urdf-viewer id="viewer" up="-Z" display-shadow></urdf-viewer>
    <div class="loading" id="loading"><div class="spinner"></div></div>
    <div class="drop-hint">Drop a .urdf file anywhere to load it</div>
  </main>
  <div class="part-label" id="part-label"></div>

  <script type="module" src="./main.ts"></script>
</body>
</html>
