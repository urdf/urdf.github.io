<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>URDF Viewer</title>
  <link rel="preload" href="https://cdn.jsdelivr.net/npm/marked@15/marked.min.js" as="script">
  <link rel="preload" href="https://cdn.jsdelivr.net/npm/dompurify@3/dist/purify.min.js" as="script">
  <style>
    /* ── Design tokens ───────────────────────────────────────────────────── */

    :root {
      --bg:            #0f1117;
      --surface:       #13151c;
      --surface-hi:    #1e2130;
      --surface-hover: #252840;
      --border:        #2a2d3a;
      --text-1:        #e5e7eb;
      --text-2:        #9ca3af;
      --text-3:        #8b93a0;
      --blue:          #007aff;
      --blue-hover:    #0066cc;
      --blue-bg:       rgba(0, 122, 255, 0.15);
      --blue-text:     #4da3ff;
      --shadow:        rgba(0, 0, 0, 0.5);
      --toggle-bg:     rgba(19, 21, 28, 0.85);
      --loading-bg:    rgba(15, 17, 23, 0.6);
      --tooltip-bg:    rgba(13, 15, 20, 0.90);
    }

    @media (prefers-color-scheme: light) {
      :root {
        --bg:            #f2f2f7;
        --surface:       #ffffff;
        --surface-hi:    #f2f2f7;
        --surface-hover: #e5e5ea;
        --border:        #c6c6c8;
        --text-1:        #1c1c1e;
        --text-2:        #3c3c43;
        --text-3:        #8e8e93;
        --blue-bg:       rgba(0, 122, 255, 0.1);
        --blue-text:     #007aff;
        --shadow:        rgba(0, 0, 0, 0.12);
        --toggle-bg:     rgba(255, 255, 255, 0.85);
        --loading-bg:    rgba(242, 242, 247, 0.6);
        --tooltip-bg:    rgba(255, 255, 255, 0.95);
      }
    }

    @media (prefers-contrast: more) {
      :root {
        --border:  #6b7280;
        --text-2:  #d1d5db;
        --text-3:  #9ca3af;
      }
    }

    @media (prefers-color-scheme: light) and (prefers-contrast: more) {
      :root {
        --border:  #48484a;
        --text-2:  #1c1c1e;
        --text-3:  #3c3c43;
      }
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    [hidden] { display: none !important; }

    body {
      font-family: system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      background: var(--bg);
      color: var(--text-1);
      height: 100dvh;
      overflow: hidden;
      user-select: none;
      -webkit-user-select: none;
    }

    input, textarea, select { user-select: text; -webkit-user-select: text; }

    /* ── Right panel ─────────────────────────────────────────────────────── */

    aside {
      background: var(--surface);
      border-left: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      position: fixed;
      right: 0;
      top: 0;
      height: 100dvh;
      width: var(--panel-w, 380px);
      z-index: 200;
      transform: translateX(100%);
      transition: transform 0.25s ease;
      box-shadow: -4px 0 24px var(--shadow);
    }

    .panel-resize-handle {
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      width: 8px;        /* hit target */
      cursor: col-resize; /* semantically correct for a vertical splitter */
      z-index: 10;
      touch-action: none;
    }

    .panel-resize-handle::after {
      content: '';
      position: absolute;
      left: 50%;
      top: 0;
      bottom: 0;
      width: 1px;
      transform: translateX(-50%);
      background: var(--border);
      transition: width 0.12s, background 0.12s;
    }

    .panel-resize-handle:hover::after,
    .panel-resize-handle.dragging::after { width: 2px; background: rgba(0, 122, 255, 0.6); }
    .panel-resize-handle.dragging::after { background: var(--blue); }

    @media (max-width: 768px) { .panel-resize-handle { display: none; } }

    aside.open { transform: translateX(0); }

    /* ── Panel header (tabs + actions) ───────────────────────────────────── */

    .panel-header {
      display: flex;
      align-items: stretch;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      height: 40px;
    }

    .panel-tabs { display: flex; flex: 1; }

    .tab-btn {
      flex: 1;
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      padding: 0;
      height: 100%;
      font-size: 0.8125rem;
      font-weight: 500;
      color: var(--text-2);
      cursor: pointer;
      transition: color 0.12s, border-color 0.12s;
    }

    .tab-btn:hover { color: var(--text-1); }

    /* Robot tab: active by default */
    .tab-btn[data-tab="robot"] { color: var(--blue-text); border-bottom-color: var(--blue); }
    body.editor-open .tab-btn[data-tab="robot"] { color: var(--text-2); border-bottom-color: transparent; }
    body.editor-open .tab-btn[data-tab="editor"] { color: var(--blue-text); border-bottom-color: var(--blue); }

    .panel-header-actions {
      display: flex;
      align-items: center;
      padding: 0 4px;
      gap: 2px;
      flex-shrink: 0;
    }

    .panel-close {
      background: none;
      border: none;
      color: var(--text-3);
      cursor: pointer;
      width: 30px;
      height: 30px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 4px;
      font-size: 0.75rem;
    }

    .panel-close:focus-visible { outline: 2px solid var(--blue); outline-offset: 1px; }
    .panel-close:hover { color: var(--text-1); }

    /* ── Tab bodies ──────────────────────────────────────────────────────── */

    .tab-body {
      display: none;
      flex-direction: column;
      flex: 1;
      overflow: hidden;
    }

    /* Robot tab shown by default */
    .tab-body[data-tab="robot"] { display: flex; }
    body.editor-open .tab-body[data-tab="robot"] { display: none; }
    body.editor-open .tab-body[data-tab="editor"] { display: flex; }

    /* ── Section blocks ──────────────────────────────────────────────────── */

    .section {
      padding: 8px 12px;
      border-bottom: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .section-label {
      font-size: 0.6875rem;
      font-weight: 500;
      color: var(--text-3);
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    /* ── Robot picker (mode-selector style) ─────────────────────────────── */

    .robot-shell {
      position: absolute;
      top: 10px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 100;
      background: var(--toggle-bg);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid var(--border);
      border-radius: 12px;
      box-shadow: 0 8px 32px var(--shadow);
      padding: 4px;
      max-width: calc(100% - 100px);
    }

    .robot-track {
      position: relative;
      display: flex;
      flex-wrap: nowrap;
      padding: 3px;
      border-radius: 8px;
      background: rgba(0, 0, 0, 0.2);
    }

    .robot-track-slider {
      position: absolute;
      border-radius: 5px;
      background: linear-gradient(135deg, rgba(0, 122, 255, 0.4), rgba(100, 60, 255, 0.4));
      box-shadow: 0 2px 10px rgba(0, 122, 255, 0.2);
      border: 1px solid rgba(255, 255, 255, 0.08);
      pointer-events: none;
      will-change: left, width;
      transition: left 0.3s ease-out, width 0.3s ease-out;
    }

    .robot-btn {
      position: relative;
      z-index: 1;
      flex: 0 0 auto;
      background: none;
      border: none;
      padding: 5px 12px;
      font-size: 0.6875rem;
      font-weight: 500;
      color: var(--text-2);
      cursor: pointer;
      transition: color 0.15s;
      white-space: nowrap;
      text-align: center;
      border-radius: 5px;
    }

    .robot-btn:hover { color: var(--text-1); }
    .robot-btn:active { transform: scale(0.94); }
    .robot-btn.active { color: #fff; }

    /* ── Checkboxes ──────────────────────────────────────────────────────── */

    .option {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.75rem;
      cursor: pointer;
      user-select: none;
      color: var(--text-2);
    }

    /* Compact inline options bar — overrides .section column layout */
    .options-bar {
      flex-direction: row;
      flex-wrap: wrap;
      align-items: center;
      gap: 4px 16px;
      padding: 7px 12px;
    }

    .options-bar select {
      flex: 0 0 auto;
      width: auto;
      height: 22px;
      padding: 0 18px 0 5px;
      font-size: 0.6875rem;
    }

    .option input[type=checkbox] {
      appearance: none;
      -webkit-appearance: none;
      width: 13px;
      height: 13px;
      flex-shrink: 0;
      border: 1px solid var(--border);
      border-radius: 3px;
      background: var(--surface-hi);
      transition: background 0.15s, border-color 0.15s, box-shadow 0.15s;
      position: relative;
      cursor: pointer;
    }

    .option input[type=checkbox]:hover:not(:checked) {
      border-color: rgba(100, 116, 139, 0.7);
    }

    .option input[type=checkbox]:focus-visible {
      outline: none;
      box-shadow: 0 0 0 2px rgba(0, 122, 255, 0.4);
    }

    .option input[type=checkbox]:checked {
      background: var(--blue);
      border-color: var(--blue);
    }

    .option input[type=checkbox]:checked::after {
      content: '';
      position: absolute;
      left: 3px;
      top: 1px;
      width: 5px;
      height: 8px;
      border: 2px solid #fff;
      border-width: 0 2px 2px 0;
      transform: rotate(45deg);
    }

    select {
      background: var(--surface-hi);
      color: var(--text-1);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 0 6px;
      height: 30px;
      font-size: 0.75rem;
    }

    select:focus-visible { outline: none; border-color: var(--blue); }

    /* ── Joints ──────────────────────────────────────────────────────────── */

    .sidebar-scroll {
      flex: 1;
      overflow-y: auto;
      scrollbar-width: thin;
      scrollbar-color: rgba(100, 116, 139, 0.4) transparent;
    }

    .sidebar-scroll::-webkit-scrollbar { width: 6px; }
    .sidebar-scroll::-webkit-scrollbar-track { background: transparent; }
    .sidebar-scroll::-webkit-scrollbar-thumb {
      background-color: rgba(100, 116, 139, 0.4);
      border-radius: 9999px;
      border: 2px solid transparent;
      background-clip: content-box;
    }
    .sidebar-scroll::-webkit-scrollbar-thumb:hover {
      background-color: rgba(100, 116, 139, 0.7);
    }

    .joints {
      padding: 6px;
    }

    .joint {
      padding: 7px 8px;
      border-radius: 6px;
      margin-bottom: 2px;
      transition: background 0.12s;
    }

    .joint[data-hovered] { background: var(--surface-hi); }

    .joint-name {
      font-size: 0.6875rem;
      color: var(--text-2);
      margin-bottom: 4px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .joint-row {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .joint-row input[type=range] {
      flex: 1;
      accent-color: var(--blue);
      height: 4px;
    }

    .joint-row input[type=number] {
      width: 58px;
      background: var(--surface-hi);
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--text-1);
      padding: 2px 4px;
      font-size: 0.6875rem;
      text-align: right;
    }

    .joint-row input:focus-visible {
      outline: 2px solid var(--blue);
      outline-offset: 1px;
    }

    /* ── Panel toggle (floating button to open/close panel) ──────────────── */

    .panel-toggle {
      display: flex;
      position: absolute;
      top: 10px;
      right: 10px;
      z-index: 100;
      background: var(--toggle-bg);
      border: 1px solid var(--border);
      border-radius: 50%;
      color: var(--text-2);
      font-size: 0.875rem;
      width: 36px;
      height: 36px;
      cursor: pointer;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(4px);
      transition: color 0.12s;
    }

    .panel-toggle:hover { color: var(--text-1); }

    .sidebar-backdrop {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.45);
      z-index: 150;
    }

    .sidebar-backdrop.visible { display: block; }

    @media (max-width: 768px) {

    }

    /* ── Viewer area ─────────────────────────────────────────────────────── */

    main {
      position: fixed;
      inset: 0;
      overflow: hidden;
      transition: right 0.25s ease;
    }

    aside.open.pinned ~ main { right: var(--panel-w, 380px); }

    urdf-viewer {
      width: 100%;
      height: 100%;
      display: block;
    }

    /* ── Loading overlay ─────────────────────────────────────────────────── */

    .loading {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--loading-bg);
      backdrop-filter: blur(4px);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s;
    }

    .loading.visible {
      opacity: 1;
      pointer-events: auto;
    }

    .spinner {
      width: 2.25rem;
      height: 2.25rem;
      animation: spin 0.75s linear infinite;
      filter: drop-shadow(0 0 6px rgba(0, 122, 255, 0.4));
    }

    @keyframes spin { to { transform: rotate(360deg); } }


    /* ── Author credits ──────────────────────────────────────────────────── */

    .viewport-credit {
      position: absolute;
      bottom: 12px;
      left: 14px;
      font-size: 0.6875rem;
      color: var(--text-3);
      text-decoration: none;
      pointer-events: auto;
      transition: color 0.12s;
      z-index: 10;
    }

    .viewport-credit:hover { color: var(--text-2); }

    /* ── Part Inspector ──────────────────────────────────────────────────── */

    #inspector {
      border-top: 1px solid var(--border);
      padding: 10px 12px 12px;
      background: var(--surface);
    }

    .inspector-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }

    .inspector-title {
      font-size: 0.6875rem;
      font-weight: 500;
      color: var(--blue);
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .inspector-close {
      background: none;
      border: none;
      color: var(--text-3);
      font-size: 0.75rem;
      cursor: pointer;
      line-height: 1;
      width: 26px;
      height: 26px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      border-radius: 3px;
    }

    .inspector-close:hover { color: var(--text-1); }

    .inspector-part-name {
      font-size: 0.75rem;
      color: var(--text-1);
      margin-bottom: 8px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .inspector-fields { display: flex; flex-direction: column; gap: 4px; }

    .inspector-row {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .inspector-row label {
      font-size: 0.6875rem;
      color: var(--text-2);
      width: 38px;
      flex-shrink: 0;
    }

    .inspector-row input[type=number],
    .inspector-row input[type=range] {
      flex: 1;
      min-width: 0;
    }

    .inspector-row input[type=number] {
      background: var(--surface-hi);
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--text-1);
      padding: 3px 5px;
      font-size: 0.6875rem;
      text-align: right;
    }

    .inspector-row input[type=number]:focus-visible { outline: none; border-color: var(--blue); }
    .inspector-row input[type=range] { accent-color: var(--blue); height: 4px; }

    .inspector-snippet-wrap { margin-top: 8px; position: relative; }

    .inspector-snippet {
      font-family: ui-monospace, monospace;
      font-size: 0.6875rem;
      color: var(--text-2);
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 6px 8px;
      white-space: pre;
      overflow-x: auto;
      cursor: text;
      user-select: all;
      display: block;
    }

    .inspector-copy {
      position: absolute;
      top: 4px;
      right: 4px;
      background: var(--surface-hi);
      border: 1px solid var(--border);
      border-radius: 3px;
      color: var(--text-3);
      font-size: 0.6875rem;
      padding: 2px 6px;
      cursor: pointer;
    }

    .inspector-copy:hover { color: var(--text-1); border-color: var(--blue); }

    /* ── Part hover label ─────────────────────────────────────────────────── */

    .part-label {
      position: fixed;
      background: var(--tooltip-bg);
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--text-1);
      font-size: 0.75rem;
      padding: 3px 8px;
      pointer-events: none;
      white-space: nowrap;
      display: none;
      z-index: 100;
    }

    /* ── Motion & contrast ───────────────────────────────────────────────── */

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }
    }

    /* ── Gesture overlay ─────────────────────────────────────────────────── */

    #gesture-overlay {
      position: fixed; inset: 0; pointer-events: none; z-index: 90;
    }

    #gesture-video {
      position: fixed; bottom: -9999px; right: -9999px;
      width: 160px; height: 90px; opacity: 0; pointer-events: none;
    }

    /* ── Gesture toggle button (in panel header) ─────────────────────────── */

    #gesture-toggle {
      display: flex;
      background: none;
      border: 1px solid transparent;
      border-radius: 5px;
      color: var(--text-2);
      width: 30px;
      height: 30px;
      cursor: pointer;
      align-items: center;
      justify-content: center;
      transition: color 0.12s, background 0.12s, border-color 0.12s;
    }

    #gesture-toggle:hover { color: var(--text-1); background: var(--surface-hi); }

    #gesture-toggle.active {
      background: var(--blue-bg); border-color: var(--blue); color: var(--blue-text);
      animation: gesture-pulse 2s ease-in-out infinite;
    }

    @keyframes gesture-pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(0, 122, 255, 0.35); }
      50%       { box-shadow: 0 0 0 6px rgba(0, 122, 255, 0); }
    }

    /* ── Gesture cheat sheet ─────────────────────────────────────────────── */

    #gesture-section { border-bottom: 1px solid var(--border); }

    #gesture-section-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 8px 12px; cursor: pointer; user-select: none; gap: 6px;
    }

    #gesture-section-header:hover { background: var(--surface-hover); }

    #gesture-section-label {
      font-size: 0.6875rem; font-weight: 500; color: var(--text-3);
      text-transform: uppercase; letter-spacing: 0.06em; flex: 1;
    }

    #gesture-section-chevron {
      font-size: 0.6875rem; color: var(--text-3);
      transition: transform 0.15s; flex-shrink: 0;
    }

    #gesture-section.open #gesture-section-chevron { transform: rotate(90deg); }

    #gesture-cheatsheet {
      display: none; padding: 6px 12px 10px;
      flex-direction: column; gap: 6px;
    }

    #gesture-section.open #gesture-cheatsheet { display: flex; }

    .gesture-row { display: flex; align-items: flex-start; gap: 8px; }

    .gesture-icon { font-size: 1rem; line-height: 1.4; flex-shrink: 0; width: 20px; text-align: center; }

    .gesture-desc { font-size: 0.6875rem; color: var(--text-2); line-height: 1.5; }

    .gesture-desc strong { color: var(--text-1); font-weight: 500; }

    /* ── Editor tab content ──────────────────────────────────────────────── */

    /* Part selector bar — visible only when select is not hidden */
    .editor-part-bar {
      display: none;
      align-items: center;
      padding: 4px 8px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      gap: 6px;
    }

    .editor-part-bar:has(select:not([hidden])) { display: flex; }

    .editor-part-bar select { flex: 1; height: 26px; font-size: 0.6875rem; padding: 0 4px; }

    .editor-pane {
      display: flex;
      flex-direction: row;
      flex: 1;
      overflow: hidden;
      border-bottom: 1px solid var(--border);
    }

    .editor-line-nums {
      width: 36px;
      flex-shrink: 0;
      background: var(--bg);
      border-right: 1px solid var(--border);
      overflow: hidden;
      font-family: ui-monospace, monospace;
      font-size: 0.6875rem;
      line-height: 19px;
      padding: 8px 0;
      user-select: none;
    }

    .editor-line-nums .lnum {
      text-align: right;
      padding-right: 6px;
      color: var(--text-3);
    }

    .editor-line-nums .lnum.hl {
      color: var(--blue-text);
      background: var(--blue-bg);
    }

    #editor-textarea {
      flex: 1;
      background: var(--bg);
      color: var(--text-1);
      border: none;
      outline: none;
      resize: none;
      font-family: ui-monospace, monospace;
      font-size: 0.6875rem;
      line-height: 19px;
      padding: 8px;
      overflow: auto;
      white-space: pre;
      tab-size: 2;
    }

    .chat-pane {
      height: 40%;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 10px 10px 6px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      min-height: 0;
      scrollbar-width: thin;
      scrollbar-color: rgba(100, 116, 139, 0.4) transparent;
    }

    .chat-messages::-webkit-scrollbar { width: 6px; }
    .chat-messages::-webkit-scrollbar-track { background: transparent; }
    .chat-messages::-webkit-scrollbar-thumb {
      background-color: rgba(100, 116, 139, 0.4);
      border-radius: 9999px;
      border: 2px solid transparent;
      background-clip: content-box;
    }
    .chat-messages::-webkit-scrollbar-thumb:hover { background-color: rgba(100, 116, 139, 0.7); }

    /* ── User bubble ─────────────────────────────────────────────────────── */

    .chat-msg-user {
      align-self: flex-end;
      max-width: 86%;
      background: rgba(0, 122, 255, 0.15);
      border: 1px solid rgba(0, 122, 255, 0.3);
      border-radius: 14px 3px 14px 14px;
      padding: 8px 12px;
      font-size: 0.8125rem;
      color: var(--text-1);
      white-space: pre-wrap;
      word-break: break-word;
    }

    /* ── Assistant bubble ────────────────────────────────────────────────── */

    .chat-msg-assistant {
      align-self: flex-start;
      max-width: 92%;
      background: var(--surface-hi);
      border: 1px solid var(--border);
      border-radius: 3px 14px 14px 14px;
      padding: 8px 12px;
      font-size: 0.8125rem;
      color: var(--text-1);
      line-height: 1.55;
    }

    .chat-msg-assistant p { margin: 3px 0; }
    .chat-msg-assistant p:first-child { margin-top: 0; }
    .chat-msg-assistant p:last-child  { margin-bottom: 0; }

    .chat-msg-assistant code {
      font-family: ui-monospace, 'JetBrains Mono', monospace;
      font-size: 0.6875rem;
      background: var(--surface-hi);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 1px 4px;
    }

    .chat-msg-assistant pre {
      background: rgba(0, 0, 0, 0.25);
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 6px;
      padding: 7px 10px;
      margin: 5px 0;
      overflow-x: auto;
      font-size: 0.6875rem;
      line-height: 1.55;
    }

    .chat-msg-assistant pre code { background: none; border: none; padding: 0; }

    .chat-msg-assistant h1, .chat-msg-assistant h2, .chat-msg-assistant h3 {
      font-size: 0.875rem; font-weight: 600; margin: 8px 0 4px;
    }

    .chat-msg-assistant ul, .chat-msg-assistant ol { margin: 4px 0; padding-left: 18px; }
    .chat-msg-assistant li { margin: 2px 0; }
    .chat-msg-assistant strong { font-weight: 600; }

    .chat-msg-assistant blockquote {
      border-left: 3px solid var(--border);
      margin: 6px 0; padding-left: 10px; color: var(--text-2);
    }

    /* ── Tool card ────────────────────────────────────────────────────────── */

    .chat-tool-card {
      align-self: flex-start;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--surface);
      display: flex; align-items: center; gap: 8px;
      padding: 4px 10px;
      font-family: ui-monospace, monospace;
      font-size: 0.6875rem;
    }

    .chat-tool-card-name { color: var(--text-2); font-weight: 500; }

    .chat-tool-card-status {
      width: 14px; height: 14px;
      display: flex; align-items: center; justify-content: center;
      position: relative;
    }

    .chat-tool-card-status:not(.ok):not(.err)::before {
      content: '';
      position: absolute; width: 10px; height: 10px;
      border: 1.5px solid var(--border);
      border-top-color: var(--text-2);
      border-radius: 50%;
      animation: tool-spin 0.7s linear infinite;
    }

    @keyframes tool-spin { to { transform: rotate(360deg); } }
    .chat-tool-card-status.ok  { color: var(--blue-text); font-size: 0.75rem; }
    .chat-tool-card-status.err { color: #f44; font-size: 0.75rem; }

    /* ── Thinking spinner ─────────────────────────────────────────────────── */

    .chat-spinner {
      display: flex; gap: 4px; padding: 8px 12px;
      align-items: center; align-self: flex-start;
      background: var(--surface-hi);
      border: 1px solid var(--border);
      border-radius: 3px 14px 14px 14px;
    }

    .chat-spinner span {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--text-3);
      animation: chat-bounce 1.2s ease-in-out infinite;
    }

    .chat-spinner span:nth-child(2) { animation-delay: 0.2s; }
    .chat-spinner span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes chat-bounce {
      0%, 80%, 100% { transform: scale(1);   opacity: 0.4; }
      40%           { transform: scale(1.4); opacity: 1;   }
    }

    /* ── Entrance animation ───────────────────────────────────────────────── */

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(5px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .chat-msg-user, .chat-msg-assistant, .chat-tool-card, .chat-spinner {
      animation: fadeInUp 0.18s cubic-bezier(0.2, 0.8, 0.2, 1) both;
    }

    /* ── Command autocomplete ────────────────────────────────────────────── */

    .cmd-ac {
      position: absolute;
      bottom: 100%;
      left: 0; right: 0;
      margin-bottom: 5px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 4px 16px var(--shadow);
      z-index: 10;
    }

    .cmd-ac-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 7px 12px;
      cursor: pointer;
      font-size: 0.8125rem;
      transition: background 0.08s;
    }

    .cmd-ac-item.selected, .cmd-ac-item:hover { background: var(--surface-hover); }

    .cmd-ac-name { font-family: ui-monospace, monospace; font-weight: 600; color: var(--blue-text); }
    .cmd-ac-arg  { font-family: ui-monospace, monospace; color: var(--text-3); font-size: 0.6875rem; }
    .cmd-ac-desc { color: var(--text-3); font-size: 0.75rem; margin-left: auto; }

    /* ── Chat input ───────────────────────────────────────────────────────── */

    .chat-input-area {
      position: relative;
      border-top: 1px solid var(--border);
      padding: 8px;
      flex-shrink: 0;
    }

    .chat-input-wrap {
      position: relative;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: var(--surface-hi);
      transition: border-color 0.15s, box-shadow 0.15s;
    }

    .chat-input-wrap:focus-within {
      border-color: rgba(0, 122, 255, 0.5);
      box-shadow: 0 0 0 3px rgba(0, 122, 255, 0.1);
    }

    #chat-input {
      width: 100%;
      padding: 9px 40px 9px 12px;
      font-size: 0.8125rem;
      font-family: system-ui, sans-serif;
      border: none;
      border-radius: 12px;
      background: transparent;
      color: var(--text-1);
      resize: none;
      line-height: 1.4;
      display: block;
      overflow-y: hidden;
      max-height: 120px;
    }

    #chat-input::placeholder { color: var(--text-3); }
    #chat-input:focus-visible { outline: none; }

    .chat-send-btn, .chat-abort-btn {
      position: absolute;
      top: 50%; right: 6px;
      transform: translateY(-50%);
      width: 28px; height: 28px;
      border-radius: 8px; border: none;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.12s, transform 0.1s;
    }

    .chat-send-btn { background: var(--blue); color: #fff; }
    .chat-send-btn:hover { background: var(--blue-hover); }
    .chat-send-btn:active { transform: translateY(-50%) scale(0.88); }
    .chat-send-btn:disabled { opacity: 0.3; cursor: not-allowed; }

    .chat-abort-btn { background: var(--surface-hover); color: var(--text-2); }
    .chat-abort-btn:hover { background: rgba(196, 57, 43, 0.8); color: #fff; }
    .chat-abort-btn:active { transform: translateY(-50%) scale(0.88); }

    /* ── Editor file tabs ─────────────────────────────────────────────────── */

    .editor-tabs {
      display: flex;
      overflow-x: auto;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      background: var(--bg);
      scrollbar-width: none;
    }

    .editor-tabs::-webkit-scrollbar { display: none; }

    .editor-tab {
      flex: 0 0 auto;
      padding: 0 12px;
      height: 32px;
      font-size: 0.75rem;
      color: var(--text-2);
      border: none;
      background: none;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      white-space: nowrap;
      transition: color 0.12s;
    }

    .editor-tab:hover { color: var(--text-1); }
    .editor-tab.active { color: var(--blue-text); border-bottom-color: var(--blue); }

    /* ── Chat section header ─────────────────────────────────────────────── */

    .chat-header {
      padding: 0 12px;
      height: 32px;
      display: flex;
      align-items: center;
      font-size: 0.6875rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--text-3);
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }
  </style>
</head>
<body>
  <aside aria-label="Controls">
    <div class="panel-resize-handle"
      role="separator"
      aria-label="Resize panel"
      aria-orientation="vertical"
      aria-valuenow="380"
      aria-valuemin="260"
      aria-valuemax="700"
      tabindex="0"
    ></div>
    <!-- Panel header: tabs + gesture toggle + close -->
    <div class="panel-header">
      <div class="panel-tabs">
        <button type="button" class="tab-btn" data-tab="robot" id="tab-robot">Robot</button>
        <button type="button" class="tab-btn" data-tab="editor" id="tab-editor">Editor</button>
      </div>
      <div class="panel-header-actions">
        <button type="button" id="gesture-toggle" aria-label="Toggle gesture mode" title="Gesture mode">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M18 11V6a2 2 0 0 0-2-2a2 2 0 0 0-2 2"/>
            <path d="M14 10V4a2 2 0 0 0-2-2a2 2 0 0 0-2 2v2"/>
            <path d="M10 10.5V6a2 2 0 0 0-2-2a2 2 0 0 0-2 2v8"/>
            <path d="M18 8a2 2 0 1 1 4 0v6a8 8 0 0 1-8 8h-2c-2.8 0-4.5-.86-5.99-2.34l-3.6-3.6a2 2 0 0 1 2.83-2.82L7 15"/>
          </svg>
        </button>
        <button type="button" class="panel-close" id="panel-close" aria-label="Close panel">✕</button>
      </div>
    </div>

    <!-- Robot tab -->
    <div class="tab-body" data-tab="robot">
      <div class="section options-bar">
        <label class="option"><input type="checkbox" id="ignore-limits" /> Ignore limits</label>
        <label class="option"><input type="checkbox" id="show-collision" /> Collision</label>
        <label class="option"><input type="checkbox" id="display-shadow" /> Shadow</label>
        <label class="option">Up
          <select id="up-axis">
            <option value="+Z">+Z (ROS)</option>
            <option value="-Z">−Z</option>
            <option value="+Y">+Y</option>
            <option value="-Y">−Y</option>
          </select>
        </label>
      </div>

      <div id="gesture-section">
        <div id="gesture-section-header" role="button" tabindex="0" aria-expanded="false">
          <span id="gesture-section-label">Gestures</span>
          <span id="gesture-section-chevron" aria-hidden="true">›</span>
        </div>
        <div id="gesture-cheatsheet" role="region">
          <div class="gesture-row">
            <span class="gesture-icon">✊</span>
            <span class="gesture-desc"><strong>Fist + move</strong> — orbit camera</span>
          </div>
          <div class="gesture-row">
            <span class="gesture-icon">☝️</span>
            <span class="gesture-desc"><strong>Point + hold 1.2 s over joint</strong> — select joint</span>
          </div>
          <div class="gesture-row">
            <span class="gesture-icon">🤚</span>
            <span class="gesture-desc"><strong>Tilt wrist</strong> (joint selected) — rotate joint</span>
          </div>
          <div class="gesture-row">
            <span class="gesture-icon">🖐️</span>
            <span class="gesture-desc"><strong>Open palm, hold 1 s</strong> — reset all joints</span>
          </div>
          <div class="gesture-row">
            <span class="gesture-icon">🤲</span>
            <span class="gesture-desc"><strong>Two hands, pinch/spread</strong> — zoom</span>
          </div>
        </div>
      </div>

      <div class="sidebar-scroll">
        <div class="section-label" style="padding: 10px 12px 4px;">Joints</div>
        <div class="joints" id="joints"></div>

        <div id="inspector" style="display:none">
          <div class="inspector-header">
            <span class="inspector-title">Inspector</span>
            <button type="button" class="inspector-close" id="inspector-close" aria-label="Deselect part">✕</button>
          </div>
          <div class="inspector-part-name" id="inspector-name"></div>
          <div class="inspector-fields">
            <div class="inspector-row">
              <label>X</label>
              <input type="number" id="inspector-x" step="0.001"/>
            </div>
            <div class="inspector-row">
              <label>Y</label>
              <input type="number" id="inspector-y" step="0.001"/>
            </div>
            <div class="inspector-row">
              <label>Z</label>
              <input type="number" id="inspector-z" step="0.001"/>
            </div>
            <div class="inspector-row">
              <label>Sx</label>
              <input type="number" id="inspector-scale-x" step="0.01" min="0.01" value="1"/>
            </div>
            <div class="inspector-row">
              <label>Sy</label>
              <input type="number" id="inspector-scale-y" step="0.01" min="0.01" value="1"/>
            </div>
            <div class="inspector-row">
              <label>Sz</label>
              <input type="number" id="inspector-scale-z" step="0.01" min="0.01" value="1"/>
            </div>
          </div>
          <div class="inspector-snippet-wrap">
            <code class="inspector-snippet" id="inspector-snippet"></code>
            <button type="button" class="inspector-copy" id="inspector-copy">Copy</button>
          </div>
        </div>
      </div>
      <div class="chat-header">AI Assistant</div>
      <div class="chat-pane">
        <div class="chat-messages" id="chat-messages" aria-live="polite" aria-label="AI conversation"></div>
        <div class="chat-input-area">
          <div id="cmd-ac" class="cmd-ac" hidden role="listbox" aria-label="Commands"></div>
          <div class="chat-input-wrap">
            <textarea
              id="chat-input"
              placeholder="Ask AI about this URDF…"
              aria-label="Chat with AI"
              rows="1"
            ></textarea>
            <button type="button" id="chat-send" class="chat-send-btn" aria-label="Send message" title="Send (Enter)">
              <svg width="14" height="14" viewBox="0 0 16 16" fill="none" aria-hidden="true">
                <path d="M8 13V3M3.5 7.5L8 3l4.5 4.5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </button>
            <button type="button" id="chat-abort" class="chat-abort-btn" hidden aria-label="Stop generating" title="Stop">
              <svg width="10" height="10" viewBox="0 0 11 11" aria-hidden="true">
                <rect width="11" height="11" rx="2" fill="currentColor"/>
              </svg>
            </button>
          </div>
        </div>
      </div>

    </div>

    <!-- Editor tab -->
    <div class="tab-body" data-tab="editor" id="editor-panel">
      <div class="editor-part-bar">
        <select id="part-select" hidden aria-label="Edit part file"></select>
      </div>
      <div class="editor-tabs" id="editor-tabs"></div>
      <div class="editor-pane">
        <div class="editor-line-nums" id="editor-line-nums" aria-hidden="true"></div>
        <textarea
          id="editor-textarea"
          spellcheck="false"
          autocomplete="off"
          autocorrect="off"
          autocapitalize="off"
          wrap="off"
          aria-label="URDF source code"
        ></textarea>
      </div>
    </div>
  </aside>

  <main>
    <button type="button" class="panel-toggle" id="panel-toggle" aria-label="Open controls">☰</button>
    <div class="robot-shell">
      <div class="robot-track" id="robots" data-gesture-track>
        <div class="robot-track-slider" id="robot-track-slider"></div>
      </div>
    </div>
    <urdf-viewer id="viewer" up="-Z" display-shadow></urdf-viewer>
    <div class="loading" id="loading">
      <svg class="spinner" viewBox="0 0 36 36" fill="none" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="spinGrad" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%"   stop-color="#007aff" stop-opacity="1" />
            <stop offset="70%"  stop-color="#007aff" stop-opacity="0.4" />
            <stop offset="100%" stop-color="#007aff" stop-opacity="0" />
          </linearGradient>
        </defs>
        <circle cx="18" cy="18" r="15" stroke="url(#spinGrad)" stroke-width="3"
                stroke-linecap="round" pathLength="100" stroke-dasharray="75 25" />
      </svg>
    </div>

    <canvas id="gesture-overlay"></canvas>
    <video id="gesture-video" playsinline muted></video>
    <a class="viewport-credit" href="https://github.com/jonasneves" target="_blank" rel="noopener">by Jonas Neves</a>
  </main>

  <div class="sidebar-backdrop" id="sidebar-backdrop"></div>
  <div class="part-label" id="part-label"></div>

  <script src="https://cdn.jsdelivr.net/npm/marked@15/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3/dist/purify.min.js"></script>
  <script type="module" src="./main.ts"></script>
  <script>
    const panel     = document.querySelector('aside');
    const backdrop  = document.getElementById('sidebar-backdrop');
    const toggleBtn = document.getElementById('panel-toggle');
    const closeBtn  = document.getElementById('panel-close');

    const isDesktop = () => window.innerWidth > 768;

    function openPanel() {
      panel.classList.add('open');
      if (isDesktop()) {
        panel.classList.add('pinned');
      } else {
        backdrop.classList.add('visible');
      }
    }

    function closePanel() {
      panel.classList.remove('open', 'pinned');
      backdrop.classList.remove('visible');
    }

    toggleBtn.addEventListener('click', openPanel);
    closeBtn.addEventListener('click', closePanel);
    backdrop.addEventListener('click', closePanel);

    // ── Panel resize (left edge drag, desktop only) ──────────────────────────
    // Best practices: W3C APG Window Splitter, VS Code sash, Grafana/Figma precedent

    const PANEL_W_KEY     = 'urdf-panel-w';
    const PANEL_W_DEFAULT = 380;
    const MIN_W           = 260;
    const SNAP_RADIUS     = 10;

    const resizeHandle = panel.querySelector('.panel-resize-handle');
    const mainEl       = document.querySelector('main');
    const widthTooltip = document.getElementById('part-label');

    function maxW() { return Math.min(700, window.innerWidth * 0.6); }

    function applyWidth(w) {
      const clamped = Math.max(MIN_W, Math.min(maxW(), w));
      document.documentElement.style.setProperty('--panel-w', clamped + 'px');
      resizeHandle.setAttribute('aria-valuenow', Math.round(clamped));
      return clamped;
    }

    function saveWidth() {
      try { localStorage.setItem(PANEL_W_KEY, panel.offsetWidth); } catch {}
    }

    // Restore saved width (desktop only)
    if (isDesktop()) {
      const saved = parseInt(localStorage.getItem(PANEL_W_KEY), 10);
      if (saved >= MIN_W) applyWidth(saved);
    }

    // Drag
    resizeHandle.addEventListener('pointerdown', e => {
      e.preventDefault();
      const startX = e.clientX;
      const startW = panel.offsetWidth;
      resizeHandle.setPointerCapture(e.pointerId);
      resizeHandle.classList.add('dragging');
      mainEl.style.transition = 'none'; // prevent right-offset lag during drag

      function onMove(e) {
        let w = startW + startX - e.clientX;
        if (Math.abs(w - PANEL_W_DEFAULT) <= SNAP_RADIUS) w = PANEL_W_DEFAULT; // magnet snap
        const applied = applyWidth(w);
        widthTooltip.textContent = Math.round(applied) + 'px';
        widthTooltip.style.left    = (e.clientX + 12) + 'px';
        widthTooltip.style.top     = (e.clientY - 20) + 'px';
        widthTooltip.style.display = 'block';
      }
      function onUp() {
        resizeHandle.classList.remove('dragging');
        mainEl.style.transition = '';
        widthTooltip.style.display = 'none';
        resizeHandle.removeEventListener('pointermove', onMove);
        resizeHandle.removeEventListener('pointerup', onUp);
        saveWidth();
      }
      resizeHandle.addEventListener('pointermove', onMove);
      resizeHandle.addEventListener('pointerup', onUp);
    });

    resizeHandle.addEventListener('dblclick', () => {
      applyWidth(PANEL_W_DEFAULT);
      saveWidth();
    });

    // Keyboard: Arrow Left widens, Arrow Right narrows (16 px/step); Home = min, End = max
    resizeHandle.addEventListener('keydown', e => {
      const cur = panel.offsetWidth;
      let next;
      switch (e.key) {
        case 'ArrowLeft':  next = cur + 16; break;
        case 'ArrowRight': next = cur - 16; break;
        case 'Home':       next = MIN_W;    break;
        case 'End':        next = maxW();   break;
        default: return;
      }
      e.preventDefault();
      applyWidth(next);
      saveWidth();
    });

    // Clamp on window resize. Do not overwrite stored value, only re-clamp if overflowing.
    let _wResizeTimer = 0;
    window.addEventListener('resize', () => {
      clearTimeout(_wResizeTimer);
      _wResizeTimer = setTimeout(() => {
        const cur = parseInt(getComputedStyle(document.documentElement).getPropertyValue('--panel-w'), 10);
        if (cur > maxW()) applyWidth(cur);
      }, 50);
    });

  </script>
</body>
</html>
