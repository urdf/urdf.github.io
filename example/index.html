<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>URDF Viewer</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, sans-serif;
      background: #111;
      color: #eee;
      display: grid;
      grid-template-columns: 280px 1fr;
      height: 100dvh;
      overflow: hidden;
    }

    aside {
      background: #1a1a1a;
      border-right: 1px solid #333;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    header {
      padding: 16px;
      border-bottom: 1px solid #333;
    }

    header h1 { font-size: 14px; font-weight: 600; letter-spacing: 0.05em; color: #aaa; text-transform: uppercase; }

    .options {
      padding: 12px;
      border-bottom: 1px solid #333;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .option {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      cursor: pointer;
      user-select: none;
    }

    .option input { accent-color: #4a9eff; }

    select {
      background: #2a2a2a;
      color: #eee;
      border: 1px solid #444;
      border-radius: 4px;
      padding: 4px 8px;
      font-size: 13px;
      flex: 1;
    }

    .robots {
      padding: 8px;
      border-bottom: 1px solid #333;
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .robot-btn {
      background: #2a2a2a;
      border: 1px solid #444;
      border-radius: 6px;
      color: #ccc;
      font-size: 12px;
      padding: 5px 10px;
      cursor: pointer;
      transition: background 0.15s, color 0.15s, border-color 0.15s;
    }

    .robot-btn:hover { background: #333; color: #eee; }
    .robot-btn.active { background: #1a3a5c; border-color: #4a9eff; color: #fff; }

    .joints {
      flex: 1;
      overflow-y: auto;
      padding: 8px;
    }

    .joint {
      padding: 8px;
      border-radius: 6px;
      margin-bottom: 4px;
      transition: background 0.15s;
    }

    .joint[data-hovered] { background: #2a2a2a; }

    .joint-name {
      font-size: 12px;
      color: #999;
      margin-bottom: 4px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .joint-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .joint-row input[type=range] {
      flex: 1;
      accent-color: #4a9eff;
    }

    .joint-row input[type=number] {
      width: 64px;
      background: #2a2a2a;
      border: 1px solid #444;
      border-radius: 4px;
      color: #eee;
      padding: 2px 4px;
      font-size: 12px;
      text-align: right;
    }

    .joint-row input[type=number]:focus,
    .joint-row input[type=range]:focus { outline: none; }

    main {
      position: relative;
    }

    urdf-viewer {
      width: 100%;
      height: 100%;
      display: block;
    }
  </style>
</head>
<body>
  <aside>
    <header>
      <h1>URDF Viewer</h1>
    </header>

    <div class="options">
      <label class="option">
        <input type="checkbox" id="ignore-limits" /> Ignore limits
      </label>
      <label class="option">
        <input type="checkbox" id="show-collision" /> Show collision
      </label>
      <label class="option">
        <input type="checkbox" id="display-shadow" /> Shadow
      </label>
      <label class="option">
        Up axis
        <select id="up-axis">
          <option value="+Z" selected>+Z (ROS)</option>
          <option value="-Z">−Z</option>
          <option value="+Y">+Y</option>
          <option value="-Y">−Y</option>
        </select>
      </label>
    </div>

    <div class="robots" id="robots"></div>

    <div class="joints" id="joints"></div>
  </aside>

  <main>
    <urdf-viewer
      id="viewer"
      up="-Z"
      display-shadow
    ></urdf-viewer>
  </main>

  <script type="module" src="./main.ts"></script>
</body>
</html>
